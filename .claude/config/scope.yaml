# 작업 스코프 정의
# /develop {스코프} 호출 시 AI의 수정 가능 경로를 제한한다.
#
# 분리 원칙:
#   ceremony/* — 경조사 전용 코드
#   member/*, merchant/* — 복지 공통 (모든 업무에서 재사용)
#   common/*, config/* — 인프라 공통
#   batch/* — 배치 처리

features:
  scope:
    enabled: true

scopes:
  - id: ceremony
    description: 경조사지원 전용 (신청·승인·지급·정산)
    allowedPaths:
      - src/main/java/com/beplepay/welfareaxbe/ceremony/**
      - src/test/java/com/beplepay/welfareaxbe/ceremony/**
    sharedModules:
      - src/main/java/com/beplepay/welfareaxbe/common/**
      - src/main/java/com/beplepay/welfareaxbe/member/**
      - src/main/java/com/beplepay/welfareaxbe/merchant/**

  - id: member
    description: 회원 관리 — 복지 공통
    allowedPaths:
      - src/main/java/com/beplepay/welfareaxbe/member/**
      - src/test/java/com/beplepay/welfareaxbe/member/**
    sharedModules:
      - src/main/java/com/beplepay/welfareaxbe/common/**

  - id: merchant
    description: 가맹점 관리 — 복지 공통
    allowedPaths:
      - src/main/java/com/beplepay/welfareaxbe/merchant/**
      - src/test/java/com/beplepay/welfareaxbe/merchant/**
    sharedModules:
      - src/main/java/com/beplepay/welfareaxbe/common/**

  - id: common
    description: 공통 인프라 (예외, 응답 래퍼, 보안, 설정)
    allowedPaths:
      - src/main/java/com/beplepay/welfareaxbe/common/**
      - src/main/java/com/beplepay/welfareaxbe/config/**
      - src/main/java/com/beplepay/welfareaxbe/security/**
      - src/test/java/com/beplepay/welfareaxbe/common/**
      - src/main/resources/application.yaml
      - src/main/resources/application-local.yaml
      - src/main/resources/application-dev.yaml
    sharedModules: []

  - id: batch
    description: 배치 처리 (경조사 정산, 만료 처리)
    allowedPaths:
      - src/main/java/com/beplepay/welfareaxbe/batch/**
      - src/test/java/com/beplepay/welfareaxbe/batch/**
    sharedModules:
      - src/main/java/com/beplepay/welfareaxbe/common/**
      - src/main/java/com/beplepay/welfareaxbe/ceremony/**
