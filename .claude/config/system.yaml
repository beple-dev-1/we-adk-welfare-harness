systemName: we-adk-welfare
basePackage: com.beplepay.weadk.welfare

db:
  vendor: postgresql
  schemaPrefix: ""

review:
  defaultLanguage: ko
  maxFiles: 50
  maxLines: 5000
  reviewerAgent: none

git:
  protectedBranches:
    - main
    - develop
    - release-*
    - internal-*

# 버전관리 — 현재 GitHub 사용, 추후 GitLab으로 전환 예정
# GitLab 전환 시: current → gitlab, gitlab.baseUrl / gitlab.remote 값 입력
vcs:
  current: github
  github:
    baseUrl: https://github.com
    remote: https://github.com/beple-dev-1/we-adk-welfare.git
  gitlab:
    baseUrl: ""           # GitLab 전환 시 설정 (예: https://gitlab.beple.co.kr)
    remote: ""            # GitLab 전환 시 설정 (예: https://gitlab.beple.co.kr/beple/we-adk-welfare.git)
    projectMappings: {}

# 하네스 레포 — .claude/, CLAUDE.md 를 별도 레포에서 관리
# GitLab 전환 시: current → gitlab, gitlab.remote 값 입력
# 브랜치 전략: 소스 레포와 동일하게 feature 브랜치 → PR/MR → main 머지
harness:
  current: github
  localPath: ../we-adk-welfare-harness
  branchStrategy: feature-pr   # main 직접 커밋 금지, feature/{설명}/gkwns458 브랜치 사용
  github:
    remote: https://github.com/beple-dev-1/we-adk-welfare-harness.git
  gitlab:
    remote: ""            # GitLab 전환 시 설정 (예: https://gitlab.beple.co.kr/beple/we-adk-welfare-harness.git)

notification:
  enabled: false
  type: ""

# 환경 구성 (local → dev → prod)
environments:
  local:
    description: 로컬 개발 (GitHub + 로컬 DB)
    vcs: github
  dev:
    description: 개발 서버 (GitLab + 실제 개발 DB) — 추후 구성
    vcs: gitlab
  prod:
    description: 운영 (GitLab + 운영 DB) — 추후 구성
    vcs: gitlab

features:
  scope:
    enabled: true
  mrComment:
    enabled: false    # GitLab 전환 후 true로 변경
  flowNotification:
    enabled: false
